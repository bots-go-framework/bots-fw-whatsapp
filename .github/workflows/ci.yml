name: Go CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching v*, i.e. v20.15.10
  pull_request:
    branches:
      - '**'

jobs:

  dalgo_boundary:
    name: DALgo boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Reject DALgo imports and transitive dependencies
        run: |
          if grep -R --include='*.go' 'github.com/dal-go/dalgo' . | grep -v '_test.go'; then
            echo 'DALgo belongs in bots-fw-whatsapp-dalgo, not bots-fw-whatsapp.'
            exit 1
          fi
          if go list -deps ./... | grep -q '^github.com/dal-go/dalgo'; then
            echo 'bots-fw-whatsapp must not have DALgo in its dependency graph.'
            exit 1
          fi

  strongo_workflow:
    permissions:
      contents: write
    uses: strongo/cicd/.github/workflows/workflow.yml@main
    with:
      # The shared semantic-release step currently requires package.json even
      # for Go-only modules. Keep CI green and publish explicit v0 tags.
      disable-version-bumping: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
